<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Acquainted{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('welcome') }}">Acquainted</a>
        <div class="topbar-right">
            {% block topbar_right %}{% endblock %}
            <form method="post" action="{{ url_for('exit_app') }}" class="exit-form"
                  onsubmit="return confirm('Shut down the Acquainted server?');">
                <button type="submit" class="btn exit-btn" title="Shut down the server">Exit</button>
            </form>
        </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flashes">
          {% for category, msg in messages %}
            <div class="flash flash-{{ category }}">{{ msg }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
